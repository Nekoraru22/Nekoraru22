name: GitHub Metrics 🐾
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push:
    branches: ["master", "main"]
jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - name: 🐈 General & Languages
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          filename: header.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Nekoraru22
          base: header, community, repositories, metadata
          base_indepth: yes
          config_timezone: Europe/Madrid
          
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_introduction: yes
          
          plugin_isocalendar: yes

          plugin_languages: yes
          plugin_languages_ignored: html, css, tex, less, dockerfile, makefile, qmake, lex, cmake, shell, gnuplot, vue, scala, ejs
          plugin_languages_details: lines, bytes-size, percentage
          plugin_languages_sections: most-used, recently-used
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          
          plugin_traffic: no
          
          plugin_fortune: yes
          
      - name: 🐈 Medias
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          filename: medias.svg
          base: ""
          config_order: anilist, music
          output_action: gist
          plugin_anilist: yes
          plugin_anilist_user: Nekogamii
          plugin_anilist_medias: anime
          plugin_anilist_sections: favorites, characters
          plugin_anilist_limit: 2
          plugin_anilist_limit_characters: 22
