name: GitHub Metrics 🐾
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push:
    branches: ["master", "main"]
jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - name: 🐈 General & Languages
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          filename: header.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Nekoraru22
          base: header, community, repositories, metadata
          base_indepth: yes
          config_timezone: Europe/Madrid
          
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_introduction: yes

      - name: 🐾 Achievements & Activity
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          filename: activity.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Nekoraru22
          base: ""
          config_timezone: Europe/Madrid
          
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          
          plugin_achievements: no
          
          plugin_habits: no
          plugin_activity: no
          
          plugin_traffic: no
          
          plugin_fortune: yes
