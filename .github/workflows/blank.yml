name: GitHub Metrics 🐾

on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push:
    branches: ["master", "main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Generate Full Metrics
        uses: lowlighter/metrics@latest
        with:
          # --- CONFIGURACIÓN BASE ---
          token: ${{ secrets.METRICS_TOKEN }}
          user: Nekoraru22
          template: classic
          base: header, community, repositories, metadata
          config_timezone: Europe/Madrid
          
          # --- VISITAS (TRAFFIC) ---
          plugin_traffic: yes

          # --- TEMAS E INTERESES (TOPICS) ---
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons

          # --- LENGUAJES (LANGUAGES) ---
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_ignored: html, css # Ignora lenguajes básicos si quieres resaltar lógica
          plugin_languages_limit: 8

          # --- CALENDARIO 3D (ISOCALENDAR) ---
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # --- INTRODUCCIÓN (INTRODUCTION) ---
          plugin_introduction: yes

          # --- HÁBITOS DE CÓDIGO (HABITS) ---
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # --- SEGUIMIENTO (FOLLOWUP) ---
          plugin_followup: yes
          plugin_followup_sections: repositories, user

          # --- LÍNEAS DE CÓDIGO (CODE) ---
          plugin_code: yes
          plugin_code_lines: 12
          plugin_code_load: 400

          # --- ACTIVIDAD RECIENTE (ACTIVITY) ---
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: all

          # --- LOGROS (ACHIEVEMENTS) ---
          plugin_achievements: yes
          plugin_achievements_threshold: C # Muestra logros de nivel bronce en adelante
          plugin_achievements_display: compact
