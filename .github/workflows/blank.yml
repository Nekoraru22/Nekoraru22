name: GitHub Metrics 🐾

on:
  # Se actualiza automáticamente cada día a medianoche
  schedule: [{cron: "0 0 * * *"}]
  
  # Te permite ejecutarlo manualmente desde la pestaña "Actions"
  workflow_dispatch:
  
  # Se ejecuta cada vez que haces un push a la rama principal
  push:
    branches: ["master", "main"]

jobs:
  github-metrics:
    # Usamos los servidores gratis de GitHub (Ubuntu)
    runs-on: ubuntu-latest
    
    # IMPORTANTE: Permisos para que la Action pueda guardar la imagen en tu repo
    permissions:
      contents: write
      
    steps:
      # Este paso es el que hace toda la magia de los gráficos
      - name: Generate Metrics
        uses: lowlighter/metrics@latest
        with:
          # Tu token secreto (debes configurarlo en Settings > Secrets)
          token: ${{ secrets.METRICS_TOKEN }}
          
          # Configuración básica (puedes añadir más cosas aquí luego)
          user: Nekoraru22
          template: classic
          base: header, community, repositories, metadata
          config_timezone: Europe/Madrid # Ajusta a tu zona horaria
