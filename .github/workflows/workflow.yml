name: GitHub Metrics 🐾
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  # push:
  #   branches: ["master", "main"]
jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - name: 🐈 General
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          filename: assets/header.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Nekoraru22
          base: header, community, repositories, metadata
          base_indepth: yes
          config_timezone: Europe/Madrid
          extras_css: |
            h1.field, h2.field, h3.field { color: #c550de !important }
            [fill="#ebedf0"] { fill: #ede9f5 !important }
            [fill="#9be9a8"] { fill: #d8b4fe !important }
            [fill="#40c463"] { fill: #c084fc !important }
            [fill="#30a14e"] { fill: #9900ef !important }
            [fill="#216e39"] { fill: #6b21a8 !important }

          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_introduction: yes

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      - name: 🍀 Fortune
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          filename: assets/fortune.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Nekoraru22
          base: ""
          extras_css: |
            h1.field, h2.field, h3.field { color: #c550de !important }
            b[style*="#F51C6A"] { color: #FFD700 !important }
            b[style*="#FD4D32"] { color: #22c55e !important }
            b[style*="#E7890C"] { color: #4ade80 !important }
            b[style*="#BAC200"] { color: #eab308 !important }
            b[style*="#7FEC11"] { color: #fb7185 !important }
            b[style*="#43FD3B"] { color: #06b6d4 !important }
            b[style*="#16F174"] { color: #9ca3af !important }
            b[style*="#00CBB0"] { color: #fbbf24 !important }
            b[style*="#0893E1"] { color: #a78bfa !important }
            b[style*="#2A56FB"] { color: #8b5cf6 !important }
            b[style*="#6023F8"] { color: #14b8a6 !important }
            b[style*="#9D05DA"] { color: #ef4444 !important }
            b[style*="#D302A7"] { color: #FFD700 !important }

          plugin_fortune: yes

      - name: Checkout
        if: ${{ success() || failure() }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: 📊 Fetch & recolor profile summary cards
        if: ${{ success() || failure() }}
        run: |
          curl -sS "https://github-profile-summary-cards.vercel.app/api/cards/profile-details?username=nekoraru22&theme=transparent" \
            | sed 's/#006AFF/#c550de/g; s/#0579C3/#9900ef/g; s/#417E87/#A78BFA/g' \
            > assets/stats.svg

          curl -sS "https://github-profile-summary-cards.vercel.app/api/cards/repos-per-language?username=nekoraru22&theme=transparent" \
            | sed 's/#006AFF/#c550de/g; s/#417E87/#A78BFA/g' \
            > assets/languages.svg

      - name: 💾 Commit cards
        if: ${{ success() || failure() }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/stats.svg assets/languages.svg
          git diff --staged --quiet || git commit -m "chore: update stats and language cards"
          git push
