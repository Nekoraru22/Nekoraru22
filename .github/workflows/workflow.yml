name: GitHub Metrics 🐾
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  # push:
  #   branches: ["master", "main"]
jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - name: 🐈 General
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          filename: assets/header.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Nekoraru22
          base: header, community, repositories, metadata
          base_indepth: yes
          config_timezone: Europe/Madrid
          extras_css: |
            text[font-weight="600"], text[font-weight="bold"],
            .field > text, text.field,
            text[fill="#0078d4"], text[fill="#0969da"] { fill: #c550de !important }

          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_introduction: yes

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      - name: 🐈 Fortune
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          filename: assets/fortune.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Nekoraru22
          base: ""
          extras_css: |
            text[font-weight="600"], text[font-weight="bold"],
            .field > text, text.field,
            text[fill="#0078d4"], text[fill="#0969da"] { fill: #c550de !important }

          plugin_fortune: yes

      - name: 📊 Stats
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          filename: assets/stats.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Nekoraru22
          base: repositories
          config_timezone: Europe/Madrid
          config_background: "#00000000"
          extras_css: |
            text { fill: #A78BFA !important }
            .border { stroke: #7C3AED !important }

      - name: 🌍 Languages
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          filename: assets/languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Nekoraru22
          base: ""
          config_timezone: Europe/Madrid
          config_background: "#00000000"
          extras_css: |
            text { fill: #A78BFA !important }
            .border { stroke: #7C3AED !important }

          plugin_languages: yes
          plugin_languages_sections: most-used
