name: GitHub Metrics 🐾
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  # push:
  #   branches: ["master", "main"]
jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: 🐈 General
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          filename: assets/header.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Nekoraru22
          base: header, community, repositories, metadata
          base_indepth: yes
          config_timezone: Europe/Madrid
          extras_css: |
            h1.field, h2.field, h3.field { color: #c550de !important }
            [fill="#ebedf0"] { fill: #ede9f5 !important }
            [fill="#9be9a8"] { fill: #d8b4fe !important }
            [fill="#40c463"] { fill: #c084fc !important }
            [fill="#30a14e"] { fill: #9900ef !important }
            [fill="#216e39"] { fill: #6b21a8 !important }

          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_introduction: yes

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      - name: 🍀 Fortune
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          filename: assets/fortune.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Nekoraru22
          base: ""
          extras_css: |
            h1.field, h2.field, h3.field { color: #c550de !important }

          plugin_fortune: yes

      - name: 📊 Start github-readme-stats
        if: ${{ success() || failure() }}
        run: |
          docker run -d -p 9000:9000 \
            -e PAT_1=${{ secrets.METRICS_TOKEN }} \
            -e WHITELIST=nekoraru22 \
            ghcr.io/fim-sh/github-readme-stats-docker:latest
          sleep 15

      - name: 📊 Generate Stats & Languages cards
        if: ${{ success() || failure() }}
        run: |
          curl -sS "http://localhost:9000/api?username=nekoraru22&bg_color=00000000&title_color=c550de&text_color=A78BFA&icon_color=D946EF&border_color=9900ef" -o assets/stats.svg
          curl -sS "http://localhost:9000/api/top-langs/?username=nekoraru22&bg_color=00000000&title_color=c550de&text_color=A78BFA&border_color=9900ef&layout=compact" -o assets/languages.svg

      - name: 📊 Commit cards
        if: ${{ success() || failure() }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked
          git pull --rebase
          git stash pop
          git add assets/stats.svg assets/languages.svg
          git diff --staged --quiet || git commit -m "chore: update stats and language cards"
          git push
